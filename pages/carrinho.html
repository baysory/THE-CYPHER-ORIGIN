<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sedgwick+Ave&family=Sedgwick+Ave+Display&family=Special+Gothic+Condensed+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <title>Carrinho - THE CYPHER ORIGIN</title>
</head>
<body>
    <header class="navbar navbar-expand-lg sticky-top p-4" id="cabecalho">
        <div class="container">
            <h1 class="navbar-brand m-0 fs-2 title-cor">THE CYPHER</h1>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#Menu-nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <nav class="navbar-collapse collapse justify-content-end" id="Menu-nav">
                <ul class="nav nav-pills d-block d-md-flex">
                    <li class="nav-item fw fw-bold">
                        <a href="../index.html" class="nav-link fs-4">
                            <i class="bi bi-house me-1"></i>
                            Início
                        </a>
                    </li>
                    <li class="nav-item fw fw-bold">
                        <a href="Entrar.html" class="nav-link fs-4">
                            <i class="bi bi-box-arrow-in-right me-1"></i>
                            Entrar
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="pt-5 pb-5 container-color-2">
        <div class="container">
            <h2 class="text-center sub-title-color">Carrinho de Compras</h2>
            <div class="row mt-4">
                <div class="col-md-12">
                    <table class="table table-dark">
                        <thead>
                            <tr>
                                <th class="text-colored">Produto</th>
                                <th class="text-colored">Quantidade</th>
                                <th class="text-colored">Preço Unitário</th>
                                <th class="text-colored">Total</th>
                                <th class="text-colored">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="text-sobre">
                                    <img src="../img/produtos/camisa-streetwar/camisa_prison_vermelha.webp" alt="Camiseta" style="width: 50px; height: 50px;" class="me-2 img-fluid">
                                    Camiseta Prison New York Street Vermelha
                                </td>
                                <td class="text-sobre">1</td>
                                <td class="text-sobre">R$ 89.90</td>
                                <td class="text-sobre">R$ 89.90</td>
                                <td>
                                    <button class="btn btn-sm" style="background-color: #32cd32; color: #000;">Remover</button>
                                </td>
                            </tr>
                            <tr>
                                <td class="text-sobre">
                                    <img src="../img/coleções/buckt.webp" alt="Bucket" style="width: 50px; height: 50px;" class="me-2 img-fluid">
                                    Bucket Prison x NFL Green Packers Bay
                                </td>
                                <td class="text-sobre">2</td>
                                <td class="text-sobre">R$ 59.90</td>
                                <td class="text-sobre">R$ 119.80</td>
                                <td>
                                    <button class="btn btn-sm" style="background-color: #32cd32; color: #000;">Remover</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="row justify-content-end mt-4">
                        <div class="col-md-4">
                            <h4 class="sub-title-color">Total: R$ 209.70</h4>
                            <button type="submit" class="btn fw-bold mt-4 mb-4 fs-5" style="background-color: #8A2BE2 !important; color: #32cd32; width: 100%;">Finalizar Compra</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
</body>
</html>
