<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sedgwick+Ave&family=Sedgwick+Ave+Display&family=Special+Gothic+Condensed+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <title>THE CYPHER</title>
</head>
<body>
    <header class="navbar navbar-expand-lg sticky-top p-4" id="cabecalho">
        <div class="container">
            <h1 class="navbar-brand m-0 fs-2 title-cor">THE CYPHER</h1>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#Menu-nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <nav class="navbar-collapse collapse justify-content-end" id="Menu-nav">
                <ul class="nav nav-pills d-block d-md-flex">
                    <li class="nav-item fw fw-bold">
                        <a href="index.html" class="nav-link fs-4">
                            <i class="bi bi-house me-1"></i>
                            Voltar ao Site
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <div id="fale-conosco" class="pt-5 pb-5 container-color-2">
        <div class="container">
            <h2 class="text-center sub-title-color">Cadastro de Clientes</h2>
            <div class="row justify-content-center mt-4">
                <div class="col-md-6">
                    <form method="post" action="#">
                        <div class="mb-3">
                            <input type="email" name="clientEmail" class="form-control" placeholder="E-mail" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" name="clientPassword" class="form-control" placeholder="Senha" required>
                        </div>
                            <button type="submit" class="btn fw-bold mt-4 mb-4 fs-5 text-colored">Enviar</button>
                             <p ><a href="cruid.html" class="text-colored">Não tem conta? Cadastre-se</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
</body>
</html>
